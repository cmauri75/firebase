<!doctype html>
<html lang="en">
<head>
    <title>Add to Cart</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main class="page">
        <section class="card">
            <img
                class="hero-image"
                src="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1600&q=80"
                alt="A cozy kitchen counter with fresh bread"
            >
            <div class="content">
                <h1>Add to Cart</h1>
                <p class="subtitle">Sign in, then type an item and save it to Firestore.</p>

                <div class="auth-row">
                    <button id="sign-in-button" type="button" hidden>Sign in with Google</button>
                    <button id="sign-out-button" class="secondary" type="button" hidden>Sign out</button>
                    <span id="user-info" class="user-info"></span>
                </div>

                <div id="cart-form" class="input-row" hidden>
                    <label class="sr-only" for="input-field">Item</label>
                    <input type="text" id="input-field" placeholder="Bread">
                    <button id="add-button" type="button">Add to cart</button>
                </div>
                <p id="status-message" class="status" aria-live="polite"></p>
            </div>
        </section>
    </main>
    <script type="module" src="index.js"></script>
</body>
</html>
